<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신규입사 온보딩 | 수산이앤에스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#F2F4F6; --card:#fff; --t1:#191F28; --t2:#4E5968; --t3:#8B95A1;
    --blue:#3182F6; --blue-bg:#EBF2FF; --green:#1DB67F; --green-bg:#E6F9F0;
    --orange:#FF9800; --orange-bg:#FFF4E5; --red:#F04452; --red-bg:#FDEAEC;
    --purple:#6C5CE7; --purple-bg:#F0EEFF; --line:#E5E8EB;
  }
  *{box-sizing:border-box;}
  body{margin:0 auto; max-width:1100px; background:var(--bg); color:var(--t1);
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; padding:28px 32px 80px;}
  .back-link{display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--t3); text-decoration:none; font-weight:600; margin-bottom:14px;}
  .back-link:hover{color:var(--blue);}
  .page-head{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; margin-bottom:22px;}
  h1{font-size:24px; font-weight:800; margin:0 0 4px;}
  .page-sub{font-size:13.5px; color:var(--t2); margin:0;}
  .btn{background:var(--blue); color:#fff; border:none; border-radius:10px; padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;}
  .btn:hover{background:#1B6FE0;}
  .btn.line{background:var(--card); color:var(--t2); border:1px solid var(--line);}
  .btn.line:hover{background:#F7F9FB; color:var(--t1);}
  .btn.green{background:var(--green);} .btn.green:hover{background:#17a070;}
  .btn.purple{background:var(--purple);} .btn.purple:hover{background:#5b4bd6;}
  .btn.sm{padding:5px 11px; font-size:12px; border-radius:8px;}
  .sync-badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; margin-left:6px;}
  .sync-badge.online{background:var(--green-bg); color:var(--green);}
  .sync-badge.loading{background:var(--bg); color:var(--t3);}
  .sync-badge.offline{background:var(--orange-bg); color:var(--orange);}

  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px;}
  .stat-card{background:var(--card); border-radius:18px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .stat-card .num{font-size:23px; font-weight:800;}
  .stat-card .num small{font-size:13px; font-weight:700; color:var(--t3);}
  .stat-card .lbl{font-size:12.5px; color:var(--t3); margin-top:6px; font-weight:500;}

  .card{background:var(--card); border-radius:18px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,.03); margin-bottom:14px;}
  .emp-head{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .emp-name{font-size:16px; font-weight:800;}
  .emp-meta{font-size:12.5px; color:var(--t2);}
  .prog-wrap{flex:1; min-width:120px; height:8px; background:var(--bg); border-radius:6px; overflow:hidden;}
  .prog-bar{height:100%; background:var(--green); border-radius:6px; transition:width .3s;}
  .prog-pct{font-size:12.5px; font-weight:800; color:var(--green); min-width:38px; text-align:right;}
  .checks{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px;}
  .chk{display:flex; align-items:center; gap:9px; padding:10px 12px; border:1px solid var(--line); border-radius:11px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--t2); user-select:none; transition:.12s;}
  .chk:hover{background:#F7F9FB;}
  .chk.on{background:var(--green-bg); border-color:#A8E6CD; color:var(--green);}
  .chk .box{width:19px; height:19px; border-radius:6px; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; flex-shrink:0;}
  .chk.on .box{background:var(--green); border-color:var(--green);}
  .emp-acts{display:flex; gap:6px; margin-left:auto;}
  .src{font-size:10.5px; font-weight:700; padding:1px 7px; border-radius:5px; background:var(--purple-bg); color:var(--purple);}
  .src.manual{background:var(--bg); color:var(--t3);}
  .empty{background:var(--card); border-radius:16px; padding:30px; text-align:center; color:var(--t3); font-size:13px;}
  .done-badge{font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; background:var(--green-bg); color:var(--green);}

  .modal-overlay{position:fixed; inset:0; background:rgba(25,31,40,.45); z-index:100; display:none; align-items:center; justify-content:center; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card); border-radius:22px; padding:24px; width:100%; max-width:460px; box-shadow:0 24px 60px rgba(0,0,0,.22);}
  .modal h3{font-size:18px; font-weight:800; margin:0 0 18px;}
  .fld{margin-bottom:13px;}
  .fld label{display:block; font-size:12.5px; font-weight:700; color:var(--t2); margin-bottom:6px;}
  .fld input{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; background:var(--bg); color:var(--t1);}
  .fld input:focus{outline:none; border-color:var(--blue); background:#fff;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .modal-actions{display:flex; gap:10px; margin-top:20px;}
  .modal-actions .btn{flex:1;}
</style>
</head>
<body>
  <a href="index.html" class="back-link">‹ 총무 관리 대시보드</a>
  <div class="page-head">
    <div>
      <h1>🎉 신규입사 온보딩</h1>
      <p class="page-sub">신규 입사자의 피복·웰컴키트·단체보험·사원증·규정안내 진행을 관리합니다 · 수산이앤에스 <span id="syncBadge" class="sync-badge loading">☁ 연결 중…</span></p>
    </div>
    <div style="display:flex; gap:8px;">
      <a class="btn line" href="rules.html" target="_blank">📋 회사 규정</a>
      <button class="btn line" onclick="loadAll()">↻ 새로고침</button>
      <button class="btn" onclick="openAdd()">+ 신규입사 등록</button>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="num" id="stTotal">0<small>명</small></div><div class="lbl">전체 온보딩</div></div>
    <div class="stat-card"><div class="num" id="stProgress">0<small>명</small></div><div class="lbl">진행중</div></div>
    <div class="stat-card"><div class="num" id="stDone">0<small>명</small></div><div class="lbl">완료</div></div>
  </div>

  <div id="list"><div class="empty">불러오는 중…</div></div>

  <!-- 등록 모달 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>신규입사 등록</h3>
      <div class="fld"><label>이름</label><input id="aName" placeholder="예: 홍길동"></div>
      <div class="grid2">
        <div class="fld"><label>부서</label><input id="aDept" placeholder="예: 경영지원팀"></div>
        <div class="fld"><label>직급 (선택)</label><input id="aPos" placeholder="예: 주임"></div>
      </div>
      <div class="fld"><label>입사일</label><input id="aHire" type="date"></div>
      <div class="modal-actions">
        <button class="btn line" onclick="closeAdd()">취소</button>
        <button class="btn green" onclick="saveAdd()">등록</button>
      </div>
    </div>
  </div>

<script>
const SB_URL='https://vvyqldyljajlmtydtqdf.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2eXFsZHlsamFqbG10eWR0cWRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Nzc4NTQsImV4cCI6MjA5NzI1Mzg1NH0.YakWHeL5ZZK7RZ9K6fwxNECy02uwikoHYdRT-rSpLKc';
const H={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'};
const REST=SB_URL+'/rest/v1/onboarding';

const ITEMS=[
  {key:'c_uniform',  label:'🧥 피복 지급'},
  {key:'c_kit',      label:'🎁 웰컴키트'},
  {key:'c_insurance',label:'🛡️ 단체보험'},
  {key:'c_idcard',   label:'🪪 사원증·명함'},
  {key:'c_rules',    label:'📋 규정 안내'},
];
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
let ROWS=[];

function setSync(s){const b=document.getElementById('syncBadge');const m={online:['online','☁ 연결됨'],loading:['loading','☁ 연결 중…'],offline:['offline','⚠ 오프라인']};const[c,t]=m[s]||m.loading;b.className='sync-badge '+c;b.textContent=t;}

async function loadAll(){
  setSync('loading');
  try{
    const r=await fetch(`${REST}?order=created_at.desc&limit=200`,{headers:H});
    if(!r.ok) throw new Error('HTTP '+r.status);
    ROWS=await r.json(); setSync('online'); render();
  }catch(e){ setSync('offline'); document.getElementById('list').innerHTML=`<div class="empty" style="color:var(--red)">오류: ${e.message}</div>`; }
}

function doneCount(r){ return ITEMS.filter(it=>r[it.key]).length; }
function isDone(r){ return doneCount(r)===ITEMS.length; }

function render(){
  document.getElementById('stTotal').innerHTML=ROWS.length+'<small>명</small>';
  document.getElementById('stDone').innerHTML=ROWS.filter(isDone).length+'<small>명</small>';
  document.getElementById('stProgress').innerHTML=ROWS.filter(r=>!isDone(r)).length+'<small>명</small>';

  const el=document.getElementById('list');
  if(!ROWS.length){ el.innerHTML='<div class="empty">등록된 신규입사자가 없습니다. "+ 신규입사 등록"으로 추가하세요.</div>'; return; }
  el.innerHTML=ROWS.map(r=>{
    const dc=doneCount(r), pct=Math.round(dc/ITEMS.length*100);
    const checks=ITEMS.map(it=>`
      <div class="chk ${r[it.key]?'on':''}" onclick="toggle(${r.id},'${it.key}',${!r[it.key]})">
        <span class="box">${r[it.key]?'✓':''}</span><span>${it.label}</span>
      </div>`).join('');
    return `<div class="card">
      <div class="emp-head">
        <span class="emp-name">${esc(r.name||'-')}</span>
        <span class="emp-meta">${esc(r.dept||'-')}${r.position?' · '+esc(r.position):''} · 입사 ${r.hire_date||'-'}</span>
        <span class="src ${r.source==='manual'?'manual':''}">${r.source==='manual'?'직접':'슬랙'}</span>
        ${isDone(r)?'<span class="done-badge">✅ 완료</span>':''}
        <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
        <span class="prog-pct">${pct}%</span>
        <div class="emp-acts"><button class="btn line sm" onclick="removeRow(${r.id})">🗑</button></div>
      </div>
      <div class="checks">${checks}</div>
    </div>`;
  }).join('');
}

async function toggle(id,key,val){
  try{
    const r=await fetch(`${REST}?id=eq.${id}`,{method:'PATCH',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify({[key]:val})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const row=ROWS.find(x=>x.id===id); if(row) row[key]=val; render();
  }catch(e){ alert('변경 실패: '+e.message); }
}
async function removeRow(id){
  if(!confirm('이 온보딩 기록을 삭제할까요?')) return;
  try{
    const r=await fetch(`${REST}?id=eq.${id}`,{method:'DELETE',headers:{...H,Prefer:'return=minimal'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    ROWS=ROWS.filter(x=>x.id!==id); render();
  }catch(e){ alert('삭제 실패: '+e.message); }
}

function openAdd(){ document.getElementById('addModal').classList.add('show'); setTimeout(()=>document.getElementById('aName').focus(),50); }
function closeAdd(){ document.getElementById('addModal').classList.remove('show'); }
async function saveAdd(){
  const name=document.getElementById('aName').value.trim();
  if(!name){ alert('이름을 입력하세요.'); return; }
  const rec={ name, dept:document.getElementById('aDept').value.trim(), position:document.getElementById('aPos').value.trim(),
    hire_date:document.getElementById('aHire').value||null, source:'manual' };
  try{
    const r=await fetch(REST,{method:'POST',headers:{...H,Prefer:'return=minimal'},body:JSON.stringify(rec)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    closeAdd(); ['aName','aDept','aPos','aHire'].forEach(i=>document.getElementById(i).value='');
    loadAll();
  }catch(e){ alert('등록 실패: '+e.message); }
}
document.getElementById('addModal').addEventListener('click',e=>{ if(e.target.id==='addModal') closeAdd(); });
loadAll();
</script>
</body>
</html>
