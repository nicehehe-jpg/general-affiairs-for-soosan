<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비품 구매 관리 | 수산이앤에스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#F2F4F6; --card:#fff; --t1:#191F28; --t2:#4E5968; --t3:#8B95A1;
    --blue:#3182F6; --blue-bg:#EBF2FF; --green:#1DB67F; --green-bg:#E6F9F0;
    --orange:#FF9800; --orange-bg:#FFF4E5; --red:#F04452; --red-bg:#FDEAEC;
    --purple:#6C5CE7; --purple-bg:#F0EEFF; --line:#E5E8EB;
  }
  *{box-sizing:border-box;}
  body{margin:0 auto; max-width:1180px; background:var(--bg); color:var(--t1);
    font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; padding:28px 32px 80px;}
  .back-link{display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--t3); text-decoration:none; font-weight:600; margin-bottom:14px;}
  .back-link:hover{color:var(--blue);}
  .page-head{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px; margin-bottom:22px;}
  h1{font-size:24px; font-weight:800; margin:0 0 4px;}
  .page-sub{font-size:13.5px; color:var(--t2); margin:0;}
  .btn{background:var(--blue); color:#fff; border:none; border-radius:10px; padding:9px 16px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;}
  .btn:hover{background:#1B6FE0;}
  .btn.line{background:var(--card); color:var(--t2); border:1px solid var(--line);}
  .btn.line:hover{background:#F7F9FB; color:var(--t1);}
  .btn.green{background:var(--green);} .btn.green:hover{background:#17a070;}
  .btn.sm{padding:5px 11px; font-size:12px; border-radius:8px;}
  .sync-badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; margin-left:6px; vertical-align:middle;}
  .sync-badge.online{background:var(--green-bg); color:var(--green);}
  .sync-badge.loading{background:var(--bg); color:var(--t3);}
  .sync-badge.offline{background:var(--orange-bg); color:var(--orange);}

  .stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px;}
  .stat-card{background:var(--card); border-radius:18px; padding:18px 20px; box-shadow:0 1px 2px rgba(0,0,0,.03);}
  .stat-card .num{font-size:23px; font-weight:800; line-height:1;}
  .stat-card .num small{font-size:13px; font-weight:700; color:var(--t3); margin-left:2px;}
  .stat-card .lbl{font-size:12.5px; color:var(--t3); margin-top:6px; font-weight:500;}

  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px;}
  .toolbar select, .toolbar input{padding:8px 11px; border:1px solid var(--line); border-radius:10px; font-size:13px; font-family:inherit; background:var(--card); color:var(--t1);}
  .toolbar input{flex:1; min-width:160px;}

  .table-wrap{background:var(--card); border-radius:16px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.03);}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead tr{background:var(--bg); color:var(--t3); text-align:left;}
  th,td{padding:10px 13px;}
  tbody tr{border-top:1px solid var(--line);}
  .pill{font-size:11px; font-weight:700; padding:2px 9px; border-radius:6px;}
  .src{font-size:10.5px; font-weight:700; padding:1px 6px; border-radius:5px; background:var(--purple-bg); color:var(--purple);}
  .src.manual{background:var(--bg); color:var(--t3);}
  .empty{padding:26px; text-align:center; color:var(--t3);}

  .modal-overlay{position:fixed; inset:0; background:rgba(25,31,40,.45); z-index:100; display:none; align-items:center; justify-content:center; padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--card); border-radius:22px; padding:24px; width:100%; max-width:480px; box-shadow:0 24px 60px rgba(0,0,0,.22);}
  .modal h3{font-size:18px; font-weight:800; margin:0 0 18px;}
  .fld{margin-bottom:13px;}
  .fld label{display:block; font-size:12.5px; font-weight:700; color:var(--t2); margin-bottom:6px;}
  .fld input{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; font-family:inherit; background:var(--bg); color:var(--t1);}
  .fld input:focus{outline:none; border-color:var(--blue); background:#fff;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .modal-actions{display:flex; gap:10px; margin-top:20px;}
  .modal-actions .btn{flex:1;}
</style>
</head>
<body>
  <a href="index.html" class="back-link">‹ 총무 관리 대시보드</a>
  <div class="page-head">
    <div>
      <h1>🧰 비품 구매 관리</h1>
      <p class="page-sub">사내 일반 비품·소모품 구매 신청을 접수·승인·발주·입고까지 관리합니다 · 수산이앤에스 <span id="syncBadge" class="sync-badge loading">☁ 연결 중…</span></p>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn line" onclick="loadRequests()">↻ 새로고침</button>
      <button class="btn" onclick="openAddModal()">+ 직접 등록</button>
    </div>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="num" id="stWait">0<small>건</small></div><div class="lbl">⏳ 대기</div></div>
    <div class="stat-card"><div class="num" id="stApproved">0<small>건</small></div><div class="lbl">✅ 승인</div></div>
    <div class="stat-card"><div class="num" id="stOrdered">0<small>건</small></div><div class="lbl">🚚 발주</div></div>
    <div class="stat-card"><div class="num" id="stReceived">0<small>건</small></div><div class="lbl">📦 입고완료</div></div>
  </div>

  <div class="toolbar">
    <select id="fStatus" onchange="renderRows()">
      <option value="active">진행중(대기·승인·발주)</option>
      <option value="all">전체</option>
      <option value="pending">대기</option>
      <option value="approved">승인</option>
      <option value="ordered">발주</option>
      <option value="received">입고완료</option>
      <option value="rejected">반려</option>
    </select>
    <input type="text" id="fSearch" placeholder="검색 (품목·신청자·부서)" oninput="renderRows()">
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>접수일</th><th>신청자</th><th>부서</th><th>품목</th><th>수량</th>
        <th>예상금액</th><th>희망납기</th><th>경로</th><th>상태</th><th>처리</th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="10" class="empty">불러오는 중…</td></tr></tbody>
    </table>
  </div>

  <!-- 직접 등록 모달 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <h3>비품 직접 등록</h3>
      <div class="grid2">
        <div class="fld"><label>품목</label><input id="aItem" placeholder="예: A4 복사용지"></div>
        <div class="fld"><label>수량</label><input id="aQty" placeholder="예: 5"></div>
      </div>
      <div class="fld"><label>구매 사유</label><input id="aReason" placeholder="예: 사무실 비품 소진"></div>
      <div class="grid2">
        <div class="fld"><label>신청자</label><input id="aName" placeholder="예: 홍길동"></div>
        <div class="fld"><label>부서</label><input id="aDept" placeholder="예: 경영지원팀"></div>
      </div>
      <div class="grid2">
        <div class="fld"><label>예상 금액 (선택)</label><input id="aAmount" placeholder="숫자만"></div>
        <div class="fld"><label>희망 납기 (선택)</label><input id="aDue" type="date"></div>
      </div>
      <div class="modal-actions">
        <button class="btn line" onclick="closeAddModal()">취소</button>
        <button class="btn green" onclick="saveManual()">등록</button>
      </div>
    </div>
  </div>

<script>
const SB_URL = 'https://vvyqldyljajlmtydtqdf.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2eXFsZHlsamFqbG10eWR0cWRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Nzc4NTQsImV4cCI6MjA5NzI1Mzg1NH0.YakWHeL5ZZK7RZ9K6fwxNECy02uwikoHYdRT-rSpLKc';
const H = { apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json' };
const REST = SB_URL + '/rest/v1/supply_requests';

const STATUS = {
  pending:  { label:'⏳ 대기',     bg:'var(--bg)',       color:'var(--t3)' },
  approved: { label:'✅ 승인',     bg:'var(--blue-bg)',  color:'var(--blue)' },
  ordered:  { label:'🚚 발주',     bg:'var(--orange-bg)',color:'var(--orange)' },
  received: { label:'📦 입고완료', bg:'var(--green-bg)', color:'var(--green)' },
  rejected: { label:'✖ 반려',      bg:'var(--red-bg)',   color:'var(--red)' },
};
const won = n => '₩' + (Number(n)||0).toLocaleString('ko-KR');
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let ROWS = [];

function setSync(state){
  const b = document.getElementById('syncBadge');
  const map = { online:['online','☁ 연결됨'], loading:['loading','☁ 연결 중…'], offline:['offline','⚠ 오프라인'] };
  const [cls,txt] = map[state]||map.loading; b.className='sync-badge '+cls; b.textContent=txt;
}

async function loadRequests(){
  setSync('loading');
  try{
    const r = await fetch(`${REST}?order=created_at.desc&limit=200`, { headers:H });
    if(!r.ok) throw new Error('HTTP '+r.status);
    ROWS = await r.json();
    setSync('online');
    renderStats(); renderRows();
  }catch(e){
    setSync('offline');
    document.getElementById('tbody').innerHTML = `<tr><td colspan="10" class="empty" style="color:var(--red)">오류: ${e.message}</td></tr>`;
  }
}

function renderStats(){
  const c = s => ROWS.filter(r=>r.status===s).length;
  document.getElementById('stWait').innerHTML = c('pending')+'<small>건</small>';
  document.getElementById('stApproved').innerHTML = c('approved')+'<small>건</small>';
  document.getElementById('stOrdered').innerHTML = c('ordered')+'<small>건</small>';
  document.getElementById('stReceived').innerHTML = c('received')+'<small>건</small>';
}

function renderRows(){
  const f = document.getElementById('fStatus').value;
  const q = (document.getElementById('fSearch').value||'').trim().toLowerCase();
  let list = ROWS.slice();
  if(f==='active') list = list.filter(r=>['pending','approved','ordered'].includes(r.status));
  else if(f!=='all') list = list.filter(r=>r.status===f);
  if(q) list = list.filter(r=> `${r.item||''} ${r.name||''} ${r.dept||''}`.toLowerCase().includes(q));

  const tbody = document.getElementById('tbody');
  if(!list.length){ tbody.innerHTML = '<tr><td colspan="10" class="empty">해당하는 신청이 없습니다.</td></tr>'; return; }

  tbody.innerHTML = list.map(r=>{
    const s = STATUS[r.status] || STATUS.pending;
    const srcManual = r.source==='manual';
    return `<tr>
      <td>${(r.created_at||'').slice(0,10)}</td>
      <td style="font-weight:700;">${esc(r.name||'-')}</td>
      <td style="color:var(--t2);">${esc(r.dept||'-')}</td>
      <td>${esc(r.item||'-')}</td>
      <td>${esc(String(r.qty||1))}</td>
      <td>${r.est_amount?won(r.est_amount):'-'}</td>
      <td>${r.due_date||'-'}</td>
      <td><span class="src ${srcManual?'manual':''}">${srcManual?'직접':'슬랙'}</span></td>
      <td><span class="pill" style="background:${s.bg};color:${s.color};">${s.label}</span></td>
      <td style="white-space:nowrap;">${actionBtns(r)}</td>
    </tr>`;
  }).join('');
}

function actionBtns(r){
  const id = r.id;
  const del = `<button class="btn line sm" onclick="removeReq(${id})">🗑</button>`;
  if(r.status==='pending')  return `<button class="btn green sm" onclick="setStatus(${id},'approved')">승인</button> <button class="btn line sm" onclick="setStatus(${id},'rejected')">반려</button> ${del}`;
  if(r.status==='approved') return `<button class="btn sm" onclick="setStatus(${id},'ordered')">발주완료</button> <button class="btn line sm" onclick="setStatus(${id},'rejected')">반려</button> ${del}`;
  if(r.status==='ordered')  return `<button class="btn green sm" onclick="setStatus(${id},'received')">입고완료</button> ${del}`;
  // received / rejected
  return `<button class="btn line sm" onclick="setStatus(${id},'pending')">되돌리기</button> ${del}`;
}

async function setStatus(id, status){
  try{
    const r = await fetch(`${REST}?id=eq.${id}`, { method:'PATCH', headers:{...H, Prefer:'return=minimal'}, body:JSON.stringify({ status }) });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const row = ROWS.find(x=>x.id===id); if(row) row.status = status;
    renderStats(); renderRows();
  }catch(e){ alert('상태 변경 실패: '+e.message); }
}

async function removeReq(id){
  if(!confirm('이 신청을 삭제할까요?')) return;
  try{
    const r = await fetch(`${REST}?id=eq.${id}`, { method:'DELETE', headers:{...H, Prefer:'return=minimal'} });
    if(!r.ok) throw new Error('HTTP '+r.status);
    ROWS = ROWS.filter(x=>x.id!==id);
    renderStats(); renderRows();
  }catch(e){ alert('삭제 실패: '+e.message); }
}

function openAddModal(){ document.getElementById('addModal').classList.add('show'); setTimeout(()=>document.getElementById('aItem').focus(),50); }
function closeAddModal(){ document.getElementById('addModal').classList.remove('show'); }

async function saveManual(){
  const item = document.getElementById('aItem').value.trim();
  if(!item){ alert('품목을 입력하세요.'); return; }
  const rec = {
    item,
    qty: parseInt((document.getElementById('aQty').value||'').replace(/[^0-9]/g,'')) || 1,
    reason: document.getElementById('aReason').value.trim(),
    name: document.getElementById('aName').value.trim(),
    dept: document.getElementById('aDept').value.trim(),
    est_amount: parseInt((document.getElementById('aAmount').value||'').replace(/[^0-9]/g,'')) || null,
    due_date: document.getElementById('aDue').value || null,
    status: 'pending', source: 'manual',
  };
  try{
    const r = await fetch(REST, { method:'POST', headers:{...H, Prefer:'return=minimal'}, body:JSON.stringify(rec) });
    if(!r.ok) throw new Error('HTTP '+r.status);
    closeAddModal();
    ['aItem','aQty','aReason','aName','aDept','aAmount','aDue'].forEach(i=>document.getElementById(i).value='');
    loadRequests();
  }catch(e){ alert('등록 실패: '+e.message); }
}

document.getElementById('addModal').addEventListener('click', e=>{ if(e.target.id==='addModal') closeAddModal(); });
loadRequests();
</script>
</body>
</html>
